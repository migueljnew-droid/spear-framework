<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#060d1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#030608;stop-opacity:1"/>
    </radialGradient>

    <linearGradient id="electric" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6bff"/>
      <stop offset="30%" style="stop-color:#4d8dff"/>
      <stop offset="50%" style="stop-color:#7ab3ff"/>
      <stop offset="70%" style="stop-color:#4d8dff"/>
      <stop offset="100%" style="stop-color:#1a6bff"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ab3ff"/>
      <stop offset="40%" style="stop-color:#4d8dff"/>
      <stop offset="100%" style="stop-color:#1a6bff"/>
    </linearGradient>

    <linearGradient id="lineFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4d8dff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#4d8dff;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#7ab3ff;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#4d8dff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4d8dff;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="blueAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4d8dff;stop-opacity:0.06"/>
      <stop offset="60%" style="stop-color:#4d8dff;stop-opacity:0.02"/>
      <stop offset="100%" style="stop-color:#4d8dff;stop-opacity:0"/>
    </radialGradient>

    <!-- Circuit board pattern -->
    <pattern id="circuit" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M40,0 L40,15 M40,25 L40,40 L55,40 M65,40 L80,40" fill="none" stroke="#4d8dff" stroke-width="0.3" opacity="0.06"/>
      <circle cx="40" cy="20" r="2" fill="none" stroke="#4d8dff" stroke-width="0.3" opacity="0.06"/>
      <circle cx="60" cy="40" r="2" fill="none" stroke="#4d8dff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGlow)"/>
  <rect width="1200" height="400" opacity="0.012"/>
  <rect width="1200" height="400" fill="url(#circuit)"/>

  <!-- Central aura -->
  <ellipse cx="600" cy="175" rx="400" ry="200" fill="url(#blueAura)"/>

  <!-- Phase pipeline LEFT -->
  <g opacity="0.15" transform="translate(40, 140)">
    <!-- SPEC box -->
    <rect x="0" y="0" width="70" height="30" rx="4" fill="none" stroke="#4d8dff" stroke-width="0.8"/>
    <text x="35" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#4d8dff" opacity="0.8">SPEC</text>
    <!-- Arrow -->
    <line x1="75" y1="15" x2="95" y2="15" stroke="#4d8dff" stroke-width="0.6"/>
    <polygon points="95,12 101,15 95,18" fill="#4d8dff" opacity="0.6"/>
    <!-- PLAN box -->
    <rect x="105" y="0" width="70" height="30" rx="4" fill="none" stroke="#4d8dff" stroke-width="0.8"/>
    <text x="140" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#4d8dff" opacity="0.8">PLAN</text>
  </g>

  <!-- Phase pipeline RIGHT -->
  <g opacity="0.15" transform="translate(975, 140)">
    <!-- AUDIT box -->
    <rect x="0" y="0" width="70" height="30" rx="4" fill="none" stroke="#4d8dff" stroke-width="0.8"/>
    <text x="35" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#4d8dff" opacity="0.8">AUDIT</text>
    <!-- Arrow -->
    <line x1="75" y1="15" x2="95" y2="15" stroke="#4d8dff" stroke-width="0.6"/>
    <polygon points="95,12 101,15 95,18" fill="#4d8dff" opacity="0.6"/>
    <!-- RATCHET box -->
    <rect x="105" y="0" width="80" height="30" rx="4" fill="none" stroke="#4d8dff" stroke-width="0.8"/>
    <text x="145" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#4d8dff" opacity="0.8">RATCHET</text>
  </g>

  <!-- Audit categories floating LEFT -->
  <g opacity="0.1" font-family="monospace" font-size="7" fill="#4d8dff">
    <rect x="60" y="220" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="125" y="231" text-anchor="middle">Security</text>
    <rect x="80" y="244" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="145" y="255" text-anchor="middle">Dependencies</text>
    <rect x="55" y="268" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="120" y="279" text-anchor="middle">Performance</text>
  </g>

  <!-- Audit categories floating RIGHT -->
  <g opacity="0.1" font-family="monospace" font-size="7" fill="#4d8dff">
    <rect x="1010" y="220" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="1075" y="231" text-anchor="middle">Code Quality</text>
    <rect x="990" y="244" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="1055" y="255" text-anchor="middle">Documentation</text>
    <rect x="1020" y="268" width="130" height="16" rx="3" fill="none" stroke="#4d8dff" stroke-width="0.5"/>
    <text x="1085" y="279" text-anchor="middle">Architecture</text>
  </g>

  <!-- Particles -->
  <g>
    <circle cx="150" cy="60" r="1.2" fill="#4d8dff" opacity="0.4"/>
    <circle cx="350" cy="100" r="1" fill="#7ab3ff" opacity="0.3"/>
    <circle cx="500" cy="50" r="0.8" fill="#4d8dff" opacity="0.35"/>
    <circle cx="700" cy="55" r="1" fill="#7ab3ff" opacity="0.3"/>
    <circle cx="850" cy="80" r="1.2" fill="#4d8dff" opacity="0.35"/>
    <circle cx="1050" cy="50" r="1" fill="#7ab3ff" opacity="0.4"/>
    <circle cx="200" cy="350" r="1" fill="#4d8dff" opacity="0.25"/>
    <circle cx="450" cy="340" r="0.8" fill="#7ab3ff" opacity="0.25"/>
    <circle cx="750" cy="350" r="1" fill="#4d8dff" opacity="0.3"/>
    <circle cx="1000" cy="360" r="0.8" fill="#7ab3ff" opacity="0.25"/>
  </g>

  <!-- Top accent -->
  <rect x="200" y="0" width="800" height="1.5" fill="url(#lineFade)"/>

  <!-- Corner brackets -->
  <g stroke="#4d8dff" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M15,4 L4,4 L4,30"/>
    <path d="M1185,4 L1196,4 L1196,30"/>
    <path d="M15,396 L4,396 L4,370"/>
    <path d="M1185,396 L1196,396 L1196,370"/>
  </g>

  <!-- Tagline above title -->
  <text x="600" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="10" fill="#4d8dff" letter-spacing="6" opacity="0.45">SPEC-DRIVEN  ·  AUDIT-GATED  ·  SELF-IMPROVING</text>

  <!-- Main title -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="900" font-size="72" fill="url(#titleGrad)" letter-spacing="12">
    SPEAR
  </text>

  <!-- Subtitle -->
  <text x="600" y="212" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="300" font-size="16" fill="#ffffff" letter-spacing="8" opacity="0.85">
    DEVELOPMENT METHODOLOGY
  </text>

  <!-- Divider -->
  <line x1="460" y1="232" x2="575" y2="232" stroke="url(#lineFade)" stroke-width="0.5"/>
  <circle cx="600" cy="232" r="3" fill="none" stroke="#4d8dff" stroke-width="0.6" opacity="0.4"/>
  <line x1="625" y1="232" x2="740" y2="232" stroke="url(#lineFade)" stroke-width="0.5"/>

  <!-- Phase letters -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="420" y="268" font-weight="700" font-size="18" fill="#4d8dff" opacity="0.9">S</text>
    <text x="420" y="284" font-weight="300" font-size="9" fill="#8899aa" letter-spacing="2">SPEC</text>

    <text x="480" y="276" font-size="10" fill="#4d8dff" opacity="0.2">&gt;</text>

    <text x="510" y="268" font-weight="700" font-size="18" fill="#4d8dff" opacity="0.9">P</text>
    <text x="510" y="284" font-weight="300" font-size="9" fill="#8899aa" letter-spacing="2">PLAN</text>

    <text x="570" y="276" font-size="10" fill="#4d8dff" opacity="0.2">&gt;</text>

    <text x="600" y="268" font-weight="700" font-size="18" fill="#7ab3ff" opacity="1">E</text>
    <text x="600" y="284" font-weight="300" font-size="9" fill="#8899aa" letter-spacing="1">EXECUTE</text>

    <text x="645" y="276" font-size="10" fill="#4d8dff" opacity="0.2">&gt;</text>

    <text x="690" y="268" font-weight="700" font-size="18" fill="#4d8dff" opacity="0.9">A</text>
    <text x="690" y="284" font-weight="300" font-size="9" fill="#8899aa" letter-spacing="2">AUDIT</text>

    <text x="740" y="276" font-size="10" fill="#4d8dff" opacity="0.2">&gt;</text>

    <text x="780" y="268" font-weight="700" font-size="18" fill="#4d8dff" opacity="0.9">R</text>
    <text x="780" y="284" font-weight="300" font-size="9" fill="#8899aa" letter-spacing="1">RATCHET</text>
  </g>

  <!-- Stats -->
  <text x="600" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="11" fill="#556677" letter-spacing="2">
    5 PHASES  ·  6 AUDIT CATEGORIES  ·  6 AI TOOL ADAPTERS  ·  ZERO DEPENDENCIES
  </text>

  <!-- Author -->
  <text x="600" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#4d8dff" letter-spacing="5" opacity="0.45">
    CREATED BY LOUIS GOLD
  </text>

  <!-- Bottom accent -->
  <rect x="200" y="398.5" width="800" height="1.5" fill="url(#lineFade)"/>
</svg>
